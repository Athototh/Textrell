<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文字互动游戏</title>
  <style>
    :root {{
      --bg0: #070A12;
      --bg1: #0B1024;
      --panel: rgba(255,255,255,0.06);
      --panel2: rgba(255,255,255,0.10);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.62);
      --accent: #7C5CFF;
      --accent2: #23C4FF;
      --danger: #FF3B7A;
      --border: rgba(255,255,255,0.14);
      --shadow: 0 20px 60px rgba(0,0,0,0.55);
      --radius: 18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }}

    html, body {{ height: 100%; }}
    body {{
      margin: 0;
      font-family: var(--sans);
      color: var(--text);
      background: radial-gradient(1200px 800px at 30% 10%, rgba(124,92,255,0.25), transparent 60%),
                  radial-gradient(1000px 700px at 80% 20%, rgba(35,196,255,0.18), transparent 55%),
                  radial-gradient(900px 700px at 50% 80%, rgba(255,59,122,0.10), transparent 60%),
                  linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x: hidden;
    }}

    .wrap {{
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 18px;
    }}

    .card {{
      width: min(900px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
      position: relative;
    }}

    .header {{
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      display: flex;
      gap: 12px;
      align-items: baseline;
      justify-content: space-between;
    }}

    .title {{
      font-weight: 700;
      letter-spacing: 0.3px;
    }}

    .hint {{
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }}

    .screen {{
      padding: 18px 20px 6px 20px;
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.7;
      min-height: 320px;
    }}

    .line {{
      margin: 0 0 10px 0;
      white-space: pre-wrap;
      word-break: break-word;
    }}

    .cursor {{
      display: inline-block;
      width: 10px;
      color: rgba(255,255,255,0.75);
      animation: blink 1s steps(2, start) infinite;
    }}

    @keyframes blink {{
      to {{ visibility: hidden; }}
    }}

    .choices {{
      padding: 10px 20px 20px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }}

    button.choice {{
      appearance: none;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-family: var(--sans);
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }}

    button.choice:hover {{
      transform: translateY(-1px);
      background: rgba(255,255,255,0.10);
      border-color: rgba(124,92,255,0.45);
    }}

    button.choice:active {{
      transform: translateY(0px);
    }}

    .footer {{
      padding: 12px 20px 18px 20px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }}

    .tag {{
      font-family: var(--mono);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.15);
    }}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <div class="title">文字互动游戏</div>
        <div class="hint">打字机模式 · 深色沉浸</div>
      </div>

      <div id="screen" class="screen"></div>
      <div id="choices" class="choices"></div>

      <div class="footer">
        <div>提示：如果剧本中出现未知跳转，会自动回到 <span class="tag">QS1</span></div>
        <div class="tag">Source: Feishu · Deploy: GitHub Pages</div>
      </div>
    </div>
  </div>

<script>
  const SCENES = {"QS1": {"id": "QS1", "lines": ["你苏醒了，", "看到了陌生的天花板，", "身体的不熟悉感，", "无一不在告诉你一件事——你穿越了。", "你打算？", "喊人", "观察周围", "QCC2", "你喊了人", "门被人敲响了", "“我可以进来吗？”", "传来了悠闲的声音", "让他进来", "不出声"], "options": [{"text": "toEND1", "to": "QS2"}], "ending": false}, "END1": {"id": "END1", "lines": ["周围变得阴冷，你死了", "返回开头"], "options": [], "ending": true}, "QS3": {"id": "QS3", "lines": ["你看了看周围，有点困，选择继续睡", "返回开头", "QCC5", "这一切太离谱了这不会是鬼吧wok", "我速跑"], "options": [{"text": "toEND2", "to": null}], "ending": false}, "END2": {"id": "END2", "lines": ["你发现世界是假的"], "options": [], "ending": true}};

  const screen = document.getElementById('screen');
  const choices = document.getElementById('choices');

  let typingTimer = null;

  function clearTimers() {{
    if (typingTimer) {{
      clearTimeout(typingTimer);
      typingTimer = null;
    }}
  }}

  function resetUI() {{
    clearTimers();
    screen.innerHTML = '';
    choices.innerHTML = '';
  }}

  function getScene(id) {{
    return SCENES[id] || SCENES['QS1'];
  }}

  function addLine(text) {{
    const p = document.createElement('div');
    p.className = 'line';
    p.textContent = text;
    screen.appendChild(p);
    screen.scrollTop = screen.scrollHeight;
    return p;
  }}

  function typeText(el, text, speed, cb) {{
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    cursor.textContent = '▍';
    el.textContent = '';
    el.appendChild(cursor);

    function tick() {{
      if (i >= text.length) {{
        el.removeChild(cursor);
        cb && cb();
        return;
      }}
      const ch = text.charAt(i++);
      el.insertBefore(document.createTextNode(ch), cursor);
      screen.scrollTop = screen.scrollHeight;
      typingTimer = setTimeout(tick, speed);
    }}
    tick();
  }}

  function showChoices(scene) {{
    choices.innerHTML = '';

    if (scene.ending) {{
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = '重新开始';
      btn.onclick = () => goto('QS1');
      choices.appendChild(btn);
      return;
    }}

    const opts = scene.options || [];
    if (!opts.length) {{
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = '继续';
      btn.onclick = () => goto('QS1');
      choices.appendChild(btn);
      return;
    }}

    opts.forEach((opt, idx) => {{
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = opt.text || `选项 ${idx+1}`;
      btn.onclick = () => goto(opt.to || 'QS1');
      choices.appendChild(btn);
    }});
  }}

  function playScene(sceneId) {{
    resetUI();
    const scene = getScene(sceneId);

    const lines = (scene.lines || []).slice();
    if (!lines.length) {{
      lines.push('（空场景）');
    }}

    let idx = 0;
    function nextLine() {{
      if (idx >= lines.length) {{
        showChoices(scene);
        if (scene.ending) {{
          // Auto back after a short pause, but keep restart button.
          setTimeout(() => goto('QS1'), 1800);
        }}
        return;
      }}

      const el = addLine('');
      const text = String(lines[idx++]);
      // Slightly vary speed for a more "breathing" feel.
      const speed = 18 + Math.floor(Math.random() * 10);
      typeText(el, text, speed, () => setTimeout(nextLine, 160));
    }

    nextLine();
  }}

  function goto(sceneId) {{
    const target = SCENES[sceneId] ? sceneId : 'QS1';
    playScene(target);
  }}

  // Boot
  goto('QS1');
</script>
</body>
</html>
